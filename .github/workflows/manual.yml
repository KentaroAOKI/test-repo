name: Manual Trigger
on:
  workflow_dispatch:
    input:
      name:
        type: string
        description: 'Your name'
        required: true
        default: 'World'
jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Greet the user
        run: echo "Hello, ${{ github.event.inputs.name }}!"